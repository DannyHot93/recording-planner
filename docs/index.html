<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>주간 녹화 계획표</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      background: #f6f7f9;
      color: #111;
    }
    h1 { margin-bottom: 8px; }
    .meta {
      color: #666;
      margin-bottom: 20px;
      font-size: 14px;
    }
    .wrap {
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 780px;
    }
    th, td {
      padding: 12px 10px;
      border-bottom: 1px solid #e8e8e8;
      text-align: left;
      vertical-align: top;
    }
    th { background: #fafafa; }
  </style>
</head>
<body>
  <h1>주간 녹화 계획표</h1>
  <div class="meta">마지막 업데이트: 2026-03-12 16:31:02</div>
  <div class="wrap">
    <table>
      <thead>
        <tr>
          <th>녹화일</th>
          <th>프로그램</th>
          <th>집합시간</th>
          <th>녹화시간</th>
          <th>장소</th>
          <th>비고</th>
        </tr>
      </thead>
      <tbody>
        
        <tr>
          <td>2026-03-18</td>
          <td>봄맞이 음악회</td>
          <td>13:00</td>
          <td>14:00~16:00</td>
          <td>서울시청 대강당</td>
          <td>우천시 실내 진행</td>
        </tr>
        
      </tbody>
    </table>
  </div>
</body>
</html>
