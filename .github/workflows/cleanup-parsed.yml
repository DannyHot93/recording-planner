name: Cleanup old parsed entries

on:
  schedule:
    # Runs daily at 03:00 KST (which is 18:00 UTC previous day)
    - cron: '0 18 * * *'
  workflow_dispatch: {}

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dateutil

      - name: Run cleanup (move old parsed/media to backup)
        run: |
          python3 scripts/cleanup_old_parsed.py --days 7 || true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backup_old_parsed parsed media || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(cleanup): move parsed/media older than 7 days to backup" || true
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
