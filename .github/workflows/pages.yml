name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          echo "Listing repository root"
          ls -la
          echo "Listing web-output"
          ls -la web-output || true
          echo "Copying web-output to ./public for deployment"
          rm -rf public || true
          mkdir -p public
          cp -r web-output/* public/ || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_dir: './public'
          github_token: ${{ secrets.GITHUB_TOKEN }}
